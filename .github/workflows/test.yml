name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python -B -m unittest vibe_dashcam.test_vibe_dashcam -v
